<body>
  <header class="header">
    <div class="inner">
      <a class="brand" href="index.html" aria-label="ORIGAMI GRP ホームへ">ORIGAMI GRP</a>
      <nav class="nav" aria-label="主要メニュー">

        <a href="ai-school.html">AIスクール</a>
        <a href="about.html">ORIGAMI GRPとは</a>
        <a href="faq.html">FAQ</a>
        <a href="company.html">会社概要</a>
        <a class="btn btn-nav" href="contact.html">無料相談</a>
      </nav>
    </div>
  </header>

  <section class="section">
  <div class="container">
    <h1 class="section-title">無料相談</h1>
    <p class="section-lead">今の状況を伺い、「あなたの場合、AIをどう活かすのが最適か」を一緒に整理します。相談だけでも問題ありません。</p>

    <div class="split" style="margin-top:18px;">
      <div class="card">
        <h3 style="margin-top:0;color:var(--purple);">無料相談で分かること</h3>
        <ul class="list">
          <li>あなたの強み・得意を活かせる方向性</li>
          <li>今すぐ始められるAI活用の第一歩</li>
          <li>伴走の進め方（学び→実践→改善）</li>
        </ul>
        <p style="margin-top:14px;color:#444;">
          
        </p>
      </div>

      <div class="kv">
        <h3 style="margin:0 0 10px 0;color:var(--purple);">お問い合わせフォーム</h3>
        <form>
          <label>お名前<br/><input style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,.12);" type="text" placeholder="例：山田 花子"/></label><br/><br/>
          <label>メールアドレス<br/><input style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,.12);" type="email" placeholder="例：example@email.com"/></label><br/><br/>
          <label>ご相談内容<br/><textarea style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,.12);" rows="5" placeholder="例：AIを使って副業を始めたいが、何から始めるべきか相談したい"></textarea></label><br/><br/>
          <button class="btn btn-primary" type="button">送信</button>
        </form>
      </div>
    </div>
  </div>
</section>

  <footer class="footer">
    <div class="inner">
      <div>© ORIGAMI GRP</div>
      <div>
        <a href="company.html">会社概要</a> ・

      </div>
    </div>
